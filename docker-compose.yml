version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: medixai_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: medixai_rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  redis:
    image: redis:latest
    container_name: medixai_redis
    ports:
      - '6379:6379'

volumes:
  mongo_data:
